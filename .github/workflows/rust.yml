name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build
      working-directory: theorem_prover
      run: cargo build --verbose

    - name: Run tests
      working-directory: theorem_prover
      run: cargo test --verbose

  docs:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
    - uses: actions/checkout@v4

    - name: Build rustdoc
      working-directory: theorem_prover
      run: cargo doc --no-deps

    - name: Add redirect index
      working-directory: theorem_prover
      run: |
        CRATE_NAME=$(cargo metadata --no-deps --format-version 1 \
          | jq -r '.packages[0].name' \
          | tr '-' '_')
        echo "<meta http-equiv=\"refresh\" content=\"0; url=$CRATE_NAME/\">" > target/doc/index.html

    - uses: actions/upload-pages-artifact@v3
      with:
        path: theorem_prover/target/doc

    - uses: actions/deploy-pages@v4
